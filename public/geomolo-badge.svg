<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Variante B: badge arrondi avec icône -->

  <!-- Fond arrondi -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="#0ea5a0"/>
  <rect x="10" y="10" width="100" height="100" rx="24" fill="#2cc4bf"/>

  <!-- Reflet -->
  <ellipse cx="50" cy="32" rx="30" ry="14" fill="#5eddd8" opacity="0.3"/>

  <!-- Triangle + règle centrés -->
  <g transform="translate(30, 16)">
    <!-- Triangle -->
    <polygon points="30,0 58,48 2,48" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
    <!-- Angle droit -->
    <polyline points="10,39 10,48 19,48" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Règle -->
    <rect x="2" y="53" width="56" height="8" rx="2" fill="white" opacity="0.7"/>
    <line x1="14" y1="53" x2="14" y2="59" stroke="#2cc4bf" stroke-width="1.5"/>
    <line x1="26" y1="53" x2="26" y2="59" stroke="#2cc4bf" stroke-width="1.5"/>
    <line x1="38" y1="53" x2="38" y2="59" stroke="#2cc4bf" stroke-width="1.5"/>
    <line x1="50" y1="53" x2="50" y2="59" stroke="#2cc4bf" stroke-width="1.5"/>
  </g>

  <!-- Texte -->
  <text x="60" y="92" font-family="Verdana, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">GÉO</text>
  <text x="60" y="108" font-family="Verdana, sans-serif" font-size="12" font-weight="400" fill="white" text-anchor="middle" opacity="0.8" letter-spacing="2">MOLO</text>
</svg>
